name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: apps/web-node/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ./packages/core-python
          pip install -e ./apps/cli-python
          pip install -e ./apps/api-python[dev]

      - name: Install Node dependencies
        run: npm ci
        working-directory: apps/web-node

      - name: Lint Python
        run: ruff check .

      - name: Test Python
        run: pytest

      - name: Lint Node
        run: npm run lint
        working-directory: apps/web-node

      - name: Build Node
        run: npm run build
        working-directory: apps/web-node
