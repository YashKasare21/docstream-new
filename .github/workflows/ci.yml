name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web-node/package-lock.json

      - name: Install XeLaTeX
        run: |
          sudo apt-get update -q
          sudo apt-get install -y texlive-xetex texlive-latex-extra texlive-fonts-recommended

      - name: Install all dependencies
        run: make install

      - name: Lint Python (ruff)
        run: make lint-python

      - name: Lint Web (eslint)
        run: make lint-web

      - name: Test Python (core + API)
        run: make test-python

      - name: Build Next.js app
        run: npm run build
        working-directory: apps/web-node
