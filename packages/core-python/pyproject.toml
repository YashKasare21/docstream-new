[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "docstream-core"
version = "0.2.0"
description = "Shared core library for DocStream — AI-powered document conversion (PDF -> LaTeX)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Yash Kasare", email = "yashnkasare16@gmail.com" },
]
keywords = ["pdf", "latex", "document-conversion", "ocr", "ai", "gemini", "pandoc", "xelatex", "tesseract"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Text Processing :: Markup :: LaTeX",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pymupdf>=1.23.0",
    "pytesseract>=0.3.10",
    "google-genai>=0.8.0",
    "groq>=0.11.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
    "python-docx>=1.1.0",
    "python-pptx>=1.0.0",
    "mistune>=3.0.0",
    "ollama>=0.3.0",
    "Pillow>=10.0.0",
    "openai>=2.30.0",
    "pylatexenc>=2.10",
    "pix2tex>=0.1.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
    "ruff>=0.6.0",
    "mypy>=1.11.0",
]

[project.urls]
Homepage = "https://github.com/YashKasare21/docstream-new"
Repository = "https://github.com/YashKasare21/docstream-new"
"Bug Tracker" = "https://github.com/YashKasare21/docstream-new/issues"

[tool.hatch.build.targets.wheel]
packages = ["docstream"]

[tool.hatch.build.targets.sdist]
include = [
    "docstream/**",
    "README.md",
]

[tool.ruff]
target-version = "py311"
line-length = 120
src = ["docstream", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["docstream"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
python_files = ["test_*.py"]
